name: Full Project CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  signaling-and-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Signaling tests
        run: npm test --workspace=signaling

      - name: Run Frontend unit tests
        run: npm test --workspace=frontend

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: packages/frontend

      - name: Run Frontend E2E tests
        run: npm run test:e2e --workspace=frontend

  cv-service:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/cv-service/requirements.txt
          pip install pytest pytest-asyncio pillow

      - name: Run CV Service tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/packages/cv-service
          pytest packages/cv-service/tests
